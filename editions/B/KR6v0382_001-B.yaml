body:
  text: 明密藏禪師道開遺筆凡北藏未收者無論其言義得失悉採錄其名目如左以竢明哲揀辨而出入之圓覺經大疏江西省城北龍光寺應方禪師有舊本其徒號竺章圓覺經大鈔常州府有舊本圓覺經略疏小鈔秀水東禪寺有板法華經合論宋寂音尊者造張商英附論秀水精嚴寺雲汀禪人蘇州管東溟居士俱有舊本今楞嚴寺就精嚴本刊行法華要解溫陵環師解今南北講席尚之世多流行本楞嚴論宋寂音尊者造後有正受師釐入經并有刪補改名合論常熟錢順化文學有舊本今秀水楞嚴寺如其本刊行此論尚當求寂音原本未經刪釐者楞嚴廣註淨行所述今秀水楞嚴寺有舊本楞嚴要解溫陵環師撰今南北有板流行楞嚴會解元天如則師所述今南北講席宗之世多流行本楞嚴管見我明泰法師撰此書於經意雖不無得失然亦有發前人未發者維摩詰經註肇法師撰南藏已收入世亦多流行本五臺山龍翻石有古本善楞伽經註永樂間泐公奉敕註已收入藏楞伽會譯嘉靖間宜興荊山珂法師將三譯楞伽逐段會同釐入刊行既有三譯在藏則此不必重收况此經三譯文義各自成家亦不必會也華嚴合論唐太宗時李長者造大論一百二十卷後某釐入經改名合論北京本真座主嘉興東塔寺思修禪人南京聚寶門內西小衚衕機房伍宅俱有宋元板善本伍宅本乃北京報國寺僧所遺者今秀水東禪寺刊板流行華嚴合論約語四本杭州刊行既有合論全文則此似不必收矣華嚴法界觀通玄記三卷本嵩法師述北京有板華嚴還源觀類解淨源法師述北京有板華嚴綸貫一卷復庵和尚撰北京有板原人論解圓覺法師述華嚴疏鈔會本嘉靖間有妙明法師憫念講席學人愚昧乃以清涼疏鈔釐經入疏釐疏入鈔經疏鈔科科段段釐開會入成書如儒家經書集註相似今南北講席咸宗之甚至將經疏鈔一併講解無分源派根葉殊失清涼老師作述之意蓋疏以疏經經明而疏為賸語鈔以鈔疏疏明而鈔為賸語是要之鈔以明疏疏以釋經經以載道得意則經且為長語也况疏鈔乎今不分經疏鈔一併講解是大可笑即儒生家師資訓詁亦只會明註疏以解經書本文未有併註疏而講解之者也或謂鈔不可入疏而疏不可不入經不知疏既可以入經鈔何獨不可以入疏乎入疏者入鈔之漸也入疏之見猶夫入鈔之見也其愚一其過同第大小淺深差等耳或又謂華嚴疏鈔既不應釐入然圓覺略疏法華楞嚴要解會解諸書作者已自釐入亦將析而出之乎予曰子又何愚之甚也彼既作者原自會入則其文義自是如彼其連屬何容析出此既作者原自分析則其文義自是如此其分殊何容會入大都一切經書註疏或分或合但仍作者之舊則無復議矣况今所會起止配合率多牽強或不應起而起者有之或不應截斷而截斷者有之或配合不相當者有之是又莫贖之罪也或又謂若不會入則學者惡能配合其文而求其義予曰文且不能配合又安望能明其義乎而要之一切註疏又不為此等愚昧設也嗟夫少智多愚一唱百和法華玄義文句觀無量壽佛經疏鈔等南北各有會本刊行矣而華嚴疏鈔會本近且重收入藏使繼此而會註疏者愈出入藏者愈重則繁沓雜亂可勝言哉今凡註疏藏中既收入原本則會本斷不可重收即已入者宜出之華嚴會玄雲南某師因懸談中意義事實艱深渺邈者人多不曉乃搜考諸內外典籍為之音釋別錄其本後講席無智者遂亦釐入玄談名之曰會玄講者亦併其文而講之此其視會疏鈔講疏鈔者其愚又當何如哉近亦入藏甚為雜亂宜出之宜仍其舊本另刻玄談音釋數卷或流行或入藏皆可也華嚴要解溫陵環公所述幻余兄在燕京得此本示余法華玄義文句摘要嘉興東塔寺了空有本乃天台宗學人所摘者也藏中既有玄義文句全文此不必重收法華大意嘉興天𡩋寺法舟和尚俗徒太虛居士所撰悉以儒家語詮釋其知見邪惡不可當而法舟乃印可其刊行當應同入拔舌泥犁葢法舟亦賣弄光影者也有賸語一帙行於世有眼者自能辨之嗟乎是父是子法舟太虛以之起信論筆削記江南有板流行金剛經疏論纂要刊定記圭峰纂要長水刊記今華亭泖塔有板流行金剛經十七家註其間邪見甚多非禪宗非教眼不足取也金剛科儀錄說記禪不禪教不教不足取也近續入大藏宜出之心經略疏慧燈集南北有流行板心經管視武林妙峰座主述板在昭慶寺心經無垢子註此解甚邪見惡業不足取也即大顛註亦邪淺彌陀經句解深禪師述今平洲新刻流行大彌陀經註四川某師述北京某庵新刻流行但未經覽閱未辨其邪正得失龍舒淨土文淨土指歸大祐師述秀水楞嚴寺有板萬善同歸永明壽師撰秀水楞嚴寺有板五臺北臺溝中庵師亦新刊行淨土或問秀水東禪寺有板乃天如則師所撰也夢譚記武林妙峰座主所撰板在昭慶寺永嘉集註某師所述甚膚淺差譌不足取也肇論集解淨源師集家藏宋槧本作肇論中吳集解東海舊藏也肇論遊刃鈔未經閱覽肇論註疏慈雲懺主註居姑蘇堯峰名遵式地藏經孝衡疏鈔圭峰疏遇榮鈔釋迦成道記註唐王勃撰記釋道誠註今北京龍華寺刊行出三藏記略藏收翻譯名義集南藏收北藏未收台宗折疑論釋妙明子撰平心論鐔津集明教嵩和尚撰藏中止收輔教編三卷此應盡收入冥樞會要未經覽閱宗鏡節錄近有多書緇門警訓禪林寶訓續原教論我明沈士榮太史撰大藏一覽佛祖統紀天台宗磐公作南藏已收入有門頌解妙峰覺法師述台宗五燈會元五燈今藏中止收景德傳燈餘盡未收而世亦鮮流行本則此會元不得不收矣今秀水東禪寺有板流行續傳燈錄南藏已收心燈錄𠀉玄素撰序此書世尠流行宜購求之禪宗正脈嘉興真如寺蔤庵巹師採摘五燈會元中文成書十卷既有五燈會元則此書可無收矣况此師所摘多己意也人天眼目宋智眼禪師採錄五宗綱要語句而成帙者也可收可不收三聖詩寒山拾得豐干古尊宿語錄四十八卷南藏已收入太倉王鳳州居士有宋本善四家語錄馬祖百丈黃蘖臨濟又黃蘖心要僧寶傳宋寂音尊者撰松江馬杜陵常熟瞿元立有宋元本智證傳宋寂音尊者作林間錄宋寂音尊者作已上三書秀水楞嚴寺俱刊行諸方宿衲傳宋覺範師撰石門文字禪宋覺範撰已上二書宜購求之汲古刻本甚精冷齋夜話宋覺範撰秀水馮開之太史有鈔本此書多語世諦言事似不必收矣高峯禪要五台山龍翻石有舊本善秀水精嚴寺有板天如賸語秀水東禪寺有板有語錄五本賸語或問宗乘詩文俱在內雪巖欽語錄東禪寺有板無見覩語錄天台華頂山有板徑山寂照四會語錄元叟端公至正元年集雜毒海大珠禪師語錄大慧禪師亦有雜毒海乃與竹庵同頌古者也又浙江衢州祥符寺有六十卷乃宋僧編集古宿語名禪宗雜毒海正法眼藏三卷大慧杲和尚所錄今常熟刊行宗門武庫大慧杲師所撰秀水精嚴寺有板大慧年譜秀水馮開之太史有舊本已上三書宜入附大慧語錄後楚石語錄三十卷海鹽許星石居士有鈔本今秀水楞嚴寺亦有刻本禪師名梵琦為大慧第五代孫觀其言句真的骨血也愚庵語錄諱智及端元叟之子與琦楚石同門真師子兒也全室語錄禪師名泐字季潭觀其言句真作家人㷀絕集此老乃鞦韆椿頭弄光景漢非西來正脈不宜收入慈度集此僧乃㷀絕上足其邪惡過師十倍古德云智過於師慈度以之法舟賸語師名道濟號法舟住秀水縣天寧寺賸語刊行本郡精嚴寺其佛法知見殆㷀絕之流歟笑巖集此老悟處不如㷀絕深切而知見稍正然亦有氣息無血脈照到而用常不及其殆有識治亂之智而無敷治戡亂之才者乎大都應機接物權衡多執持不定翻令藻鑑亦模糊不清而面前多學人立地狐鬼輩且得以潛竊而依憑之此其過安在哉一則以自己悟處不曾痛快徹底掀翻猶存窠臼二則以時無德山臨濟雲門石霜毒手辢心大為叱咤一轉擣巢穴而盡死其偷心三則以既非天挺豪傑又未嘗從尊貴胞胎中誕生其紀綱政令不能出自朕躬而大寶真符且無的紹故坐此耳嗟夫我明二百年來楚石季潭而後拈花一脈幾乎熄矣幸師稍能識好惡辨邪正尚廼爾爾彼淺解學語顢頇儱侗輩又惡足較哉諺云字更三寫烏焉成馬奈何吾師落筆便爾誵譌而何責於二三嗚呼痛哉冰壺集師名號蘭風當時以靜坐得少光景無師承喝破遂認為悟道生大歡喜為魔所乘由是豎指擎拳胡言漢語馮陵南北以鐵嘴自稱恬不知恥蚤年著此書後住蘇州天池山年老力強著作尤盛萬曆辛巳余坐夏武林盡得覽閱今忘其名矣有于羅道五部六冊悉為評頌而羽翼其流通者其知見混濫視法舟慈度法光輩僅倍蓰什伯而貪婪惡則千萬億乃至算數譬喻所不能盡也真近代魔種哉五部六冊正德間山東即墨縣有運糧軍人姓羅名靜者蚤年持齋一日遇邪師授以法門口訣靜坐十三年忽見東南一光遂以為得道妄引諸經語作證說卷五部曰苦功悟道曰歎世無為曰破邪顯正鑰匙曰泰山巍巍不動其一則余忘之矣破邪卷有上下二冊故曰六冊時有僧大寧者親承而師事之而蘭風又私淑而羽翼之俾其教至今猖熾宇內無從撲滅曰無為曰大乘曰無念等皆其教之名也或三更靜夜咒詛盟誓以密傳口訣或緊閉六門握拳拄舌默念默提救拔當人以出苦海或謂夫人眼視耳聽手持足行的現成是佛大佛小佛男佛女佛所作所為無非佛事何分淨染何事取舍何假修持但臨命終時一絲不挂即歸家鄉耳如此則皆其教之法也蟻屯鴇聚唱偈和佛邪混雜貪昧卑污莫可名狀而愚夫愚婦率多樂於從事而恣其貪雖禁之使不歸向有不可得此其教雖非白蓮而為害殆有甚于白蓮者乎大寧復著有孝義二冊歸空記法舟偈其徒寓江西南城縣北羊血渡者復著有心經了義金剛了義等卷若干冊皆山歌野曲之文也羅湖野錄釋曉瑩述于中甫處得來號仲溫江西人覺苑遺芳莆陽沙門達本集禪門宗要閩僧雪山祖曼集舊有刊行本今已湮沒比得錄本虞山錢存虛者雨花集國初香嚴古溪禪師所撰雖有上堂偈頌其實畫龍摸象者也賓主盤桓平廓愚師著冬谿集內外各二卷師住秀水精嚴寺師參學未徹悟而文字則善石屋集四家頌古天童雪竇投子丹霞頌古聯珠南藏已收入評唱碧巖集十卷雪竇頌圜悟評從容菴錄三卷天童頌萬松評空谷集三卷投子頌虛堂集三卷丹霞頌俱林泉評今少林師資上堂所講演入室所背誦者此也嗟夫一花五葉節外春光印度真丹其來尚矣故凡一語一默一棒一喝乃至豎拳豎指斬貓斬蛇百千三昧如金剛王寶劍出匣毒盡肝腸剜盡心膽直下令人命根斷偷心死更無汝立地轉身處亦無抵當迴避處奈何繼此而拈頌代別出焉此亦萬不得已借刀殺人曲就俯循傍敲暗擊其用心亦良苦矣奈何繼此而評唱又出焉波濤洶湧枝葉蔓延而根源喪盡此殆與癡婦養兒惟念饑寒健與衣食兒不至病且死不已者夫何異碧巖集大慧業已斧其板火其書正所謂當仁不讓圓頓教勿人情也奈何近代以來講評唱鈔秘要者又出焉此其禍葢始自無智比丘濫膺住持參學者雲集上堂啞口入室無言何以縻學眾而度時光飾檀越而需利養遂效講席而出此計少智多愚一唱百和垂至今日醜不可言以秘要為奇貨以尋行數墨識字問義為作家又其表表者則習學現成句語流滑口耳規取絹帕以為他日利養張本如近日幻休老人得法子領絹帕者不下干人雖從昔諸大老得人未有如斯之盛翻令直指真風不啻三乘曲說不立正脈無殊義學繁文而不知末後拈花東來面壁乃至立雪斷臂覆舟捐軀種種不恤以橫身唱此者此其心何心哉而震旦眾生所賴以不滯名言得翻情臼而出生死者亦恃有此故雪竇有一言之失而來枯椿獵犬之譏太陽有密付之宗而致揭膀告人之辱此其心又何心哉且古人上堂奔雷掣電倒嶽傾河寧有解說文字者乎古人入室或一喝耳聾或微言面熱或推門折足吹毛死心寧有鈔寫秘要口耳傳習類世儒童蒙訓詁之學者乎古人參學一點不到則結舌填胸一語有差則毛寒骨豎五斗蓋不可謂不了生死一絡索不可謂已絕凡情要在真參實悟而已寧有習為現語以油滑口嘴者乎古者得人獨馬祖石霜雪峯雲門為盛其餘不過钁頭邊覓取一箇半箇寧有領絹帕稱法子至千人者乎是今日宗門誠講席不若而今日少林誠戲場利局無二矣上負佛祖熱血心腸下瞎眾生清淨眼目吾恐鑊湯罏炭拔舌釘身端不為十惡眾生設而于此輩有待也嗚呼習染未久公道猶存斬新改圖是所望于智者雖然愚人之情習高尚則不足習污下則有餘源不塞流不止根不撥枝不亡非復大慧一炬悉皆令入無餘火光三昧欲其不講演不背誦不鈔謄不可得也或曰如師所言則十二部修多羅千七百則舊葛籐亦將付之一炬乎余曰不然凡在教乘不獨經論即註疏家一句一字一音一義有補經論者無妨珍重流通獨宗門下事誠無舌人解語即終日言說累牘盈篇實未嘗談一事而况古人葛籐雖千七百則欲覓一元字腳寧可得耶第有半滴野狐涎吐唾未盡者則豈惟千言萬語簇錦攢花敷布世間足以亂朱混雅所當不惜身命以爭深惡痛絕以謝佛祖而報深恩即一言半偈亦不可不嚴辨緇素別是非而垂一定之鑒孟軻氏曰經正則庶民興此又繼祖位報佛恩者大綱要令又曰孔子作春秋而亂臣賊子懼此又不肖區區饒舌狗馬心也逃虛集獨菴衍公所著道餘錄獨菴衍公所著孤月語錄五台山北山寺有板蠶骨集無際禪師所著禪師四川人玉芝集㷀絕法舟之類也通明語錄有禪人告以大智禪師所撰計二十八本板在遵化北四十里禪林寺北京報國寺延菴方丈龍佛寺上方丈延明乃師寂菴南城守居衚衕蘇道士俱有本此書未知邪正何如當求一覽閱大智禪師不知為誰亦不知何時人然所告禪者乃孟浪人多不足信也藏師蒐輯藏外經書有標目一冊平湖陸季高藏本余從吳江周安石借閱丁酉三月屬子晉侍史繕寫此中剖明禪講二家流弊剋骨見髓知為紫柏老人親承衣鉢觀者當知寶之重之是嵗三月八日牧翁題藏師刻藏時駐錫吾邑東塔從祖存虛先生擕余頂禮受其摩頂此帙中經書有云得之常熟錢順化文學又云虞山錢存虛錄者俯仰遺跡掩卷愾然丁酉七月記右藏逸經書標目一卷明密藏禪師遺筆世罕見之今得石埭楊仁山居士手鈔本附錢牧齋二跋朱筆書所云丁酉者清世祖在位之十四年也卷中朱筆評點蓋亦出自牧翁之手因併刻之以餉當世民國七年冬北京刻經處識江右梅光羲浙西徐文霨施資貳拾元共刻是書計付刻資拾柒元餘資印送功德書訖北京刻經處又識北京西城舊刑部街西頭臥佛寺街佛經流通處敬印行
